{% load static %}

<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'plugins/bootstrap-3.4.1/css/bootstrap.min.css' %}">
    <link rel="stylesheet"
        href="{% static 'plugins/bootstrap-datetimepicker-1.9.0/css/bootstrap-datetimepicker.css' %}">
    <script src="{% static 'js/jquery-3.6.3.min.js' %}"></script>
    <script src="{% static 'plugins/bootstrap-3.4.1/js/bootstrap.min.js' %}"></script>
    <script src="{% static 'plugins/bootstrap-datetimepicker-1.9.0/js/bootstrap-datetimepicker.js' %}"></script>
    <script
        src="{% static 'plugins/bootstrap-datetimepicker-1.9.0/js/locales/bootstrap-datetimepicker.zh-CN.js' %}"></script>
</head>

<body>
    <nav class="navbar navbar-default">
        <div class="container">
            <div class="navbar-header">
                <button type="button" class="navbar-toggle collapsed" data-toggle="collapse"
                    data-target="#bs-example-navbar-collapse-1" aria-expanded="false">
                    <span class="sr-only">Toggle navigation</span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                    <span class="icon-bar"></span>
                </button>
                <a class="navbar-brand" href="../">课表管理</a>
            </div>
            <div class="collapse navbar-collapse" id="bs-example-navbar-collapse-1">
                <ul class="nav navbar-nav">
                    <li><a href="/add/">添加课程</a></li>
                    <li><a href="/show/">显示界面</a></li>
                    <li><a href="/admin/app/dismonday/">修改显示课程</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div>
        <div class="container">
            <div class="panel panel-default">
                <div class="panel-heading">
                    <h3 class="panel-title"> 新建课程 </h3>
                </div>
                <div class="panel-body">
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-group col-xs-6">
                            <label class="col-sm-2 control-label">礼拜</label>
                            <div class="col-sm-10">
                                <select class="form-control" name="classdate">
                                    <option>礼拜一</option>
                                    <option>礼拜二</option>
                                    <option>礼拜三</option>
                                    <option>礼拜四</option>
                                    <option>礼拜五</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group col-xs-6">
                            <label class="col-sm-2 control-label">课程开始时间</label>
                            <div class="col-sm-10">
                                <input type="text" id="dt" class="form-control" placeholder="课程开始时间" name="classstart">
                            </div>
                        </div>
                        <div class="form-group col-xs-6">
                            <label class="col-sm-2 control-label">课程结束时间</label>
                            <div class="col-sm-10">
                                <input type="text" id="dt1" class="form-control" placeholder="课程结束时间" name="classend">
                            </div>
                        </div>
                        <div class="form-group col-xs-6">
                            <label class="col-sm-2 control-label">课程名称</label>
                            <div class="col-sm-10">
                                <input type="text" class="form-control" placeholder="课程名称" name="classname">
                            </div>
                        </div>
                        <div class="form-group col-xs-6">
                            <button type="submit" class="btn btn-primary">提交</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
        <script type="text/javascript">
            $('#dt').datetimepicker({
                forceParse: 0,
                language: 'zh-CN',
                format: 'hh:ii',
                weekStart: 1,
                todayBtn: 1,
                autoclose: 1,
                todayHighlight: 1,
                startView: 1,
                minView: 0,
                maxView: 1,
                forceParse: 1,
            })
            $('#dt1').datetimepicker({
                forceParse: 0,
                language: 'zh-CN',
                format: 'hh:ii',
                weekStart: 1,
                todayBtn: 1,
                autoclose: 1,
                todayHighlight: 1,
                startView: 1,
                minView: 0,
                maxView: 1,
                forceParse: 1,
            })
        </script>
</body>

</html>
